name: Claim Monitor

on:
  schedule:
    # Runs every 5 minutes (GitHub's minimum cron interval).
    # On PUBLIC repos this is free & unlimited.
    # On private repos the free tier gives 2,000 min/month — consider '*/15' or '*/30' instead.
    - cron: '*/5 * * * *'

  # Allows you to trigger a run manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # Needed to commit state.json back to the repo

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # Safety cutoff; each run should finish in ~30 s

    steps:
      # ── 1. Check out the repo (includes the latest state.json) ──────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install requests --quiet

      # ── 4. Run the monitor script ───────────────────────────────────────────
      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor.py

      # ── 5. Commit updated state.json back to the repo ───────────────────────
      #    [skip ci] prevents this commit from triggering another workflow run.
      - name: Save state
        run: |
          git config user.name  "claim-monitor[bot]"
          git config user.email "claim-monitor@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet \
            || git commit -m "chore: update claim state [skip ci]"
          git push
